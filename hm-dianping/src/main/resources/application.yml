server:
  port: 8081
#激活开发环境，使得application-dev.yml配置项生效
spring:
  profiles:
    active: dev
  redis:
    host: ${hmdp.redis.host}
    port: ${hmdp.redis.port}
    password: ${hmdp.redis.password}
    timeout: 60000
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${hmdp.datasource.driver-class-name}
      url: jdbc:mysql://${hmdp.datasource.host}:${hmdp.datasource.port}/${hmdp.datasource.database}?serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${hmdp.datasource.username}
      password: ${hmdp.datasource.password}
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段

mybatis-plus:
  #实体类别名扫描包
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com:
      hmdp: debug

